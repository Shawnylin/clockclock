        // ================================================================
        //  PWA - Manifest & Service Worker
        // ================================================================

        function setupPWA() {
            // 生成并注入 manifest
            const manifest = {
                name: '考试计时器',
                short_name: '考试计时',
                description: '考试计时器 - 支持套卷与题型模式的练习计时工具',
                start_url: './index.html',
                display: 'standalone',
                orientation: 'portrait',
                background_color: '#f1f5f9',
                theme_color: '#1e3a5f',
                icons: [{
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%231e3a5f'/%3E%3Ctext x='256' y='340' text-anchor='middle' font-size='240' fill='white' font-family='system-ui,sans-serif' font-weight='bold'%3E考%3C/text%3E%3C/svg%3E",
                    sizes: '512x512',
                    type: 'image/svg+xml',
                    purpose: 'any'
                }, {
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%231e3a5f'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='100' fill='white' font-family='system-ui,sans-serif' font-weight='bold'%3E考%3C/text%3E%3C/svg%3E",
                    sizes: '192x192',
                    type: 'image/svg+xml',
                    purpose: 'any'
                }]
            };

            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const manifestUrl = URL.createObjectURL(blob);
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestUrl;
            document.head.appendChild(link);

            // 注册 Service Worker
            registerSW();
        }

        function registerSW() {
            if (!('serviceWorker' in navigator)) return;

            // Service Worker 代码（作为字符串内联）
            const swCode = `
                const CACHE = '${SW_CACHE_KEY}';
                const URLS = [ './index.html', './' ];

                self.addEventListener('install', e => {
                    e.waitUntil(
                        caches.open(CACHE).then(cache => cache.addAll(URLS)).then(() => self.skipWaiting())
                    );
                });

                self.addEventListener('activate', e => {
                    e.waitUntil(
                        caches.keys().then(keys => Promise.all(keys.map(k => {
                            if (k !== CACHE) return caches.delete(k);
                        }))).then(() => self.clients.claim())
                    );
                });

                self.addEventListener('fetch', e => {
                    e.respondWith(
                        caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('离线', { status: 503 })))
                    );
                });
            `;

            try {
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);

                // 部分浏览器（如 iOS Safari）不支持 Blob URL 注册 SW
                navigator.serviceWorker.register(swUrl).then(reg => {
                    // 可选：打印成功信息
                }).catch(() => {
                    // 静默降级，应用仍然可以离线使用（通过浏览器缓存）
                    // iOS 用户可以将网页添加到主屏幕，Safari 会提供基本的离线缓存
                    console.log('Service Worker 注册失败，应用将以普通模式运行');
                });
            } catch (e) {
                // 静默降级
                console.log('Service Worker 不适用此环境');
            }
        }

        // ================================================================
        //  KEYBOARD SHORTCUTS (桌面端便利)
        // ================================================================

        document.addEventListener('keydown', function(e) {
            // 考试中按 1-4 或 A-D 快速选择
            const page = document.querySelector('.page.active');
            if (page && page.id === 'page-exam') {
                const key = e.key.toUpperCase();
                if (['A', 'B', 'C', 'D'].includes(key)) {
                    selectOption(key);
                    e.preventDefault();
                }
                if (key === ' ' || key === 'ESCAPE') {
                    // 空格暂停/恢复，ESC 打开答题卡
                    if (key === ' ') {
                        onTimerClick();
                        e.preventDefault();
                    } else {
                        openAnswerSheet();
                        e.preventDefault();
                    }
                }
            }
        });

        // ================================================================
        //  INIT
        // ================================================================

        function init() {
            // 加载存储数据
            loadState();

            // 渲染首页配置
            renderHomeConfig();

            // 检查是否有未完成的考试
            const hasProgress = appState.progress && appState.progress.status === 'inprogress';
            if (hasProgress) {
                checkResume();
            }

            // 设置 PWA
            setupPWA();
        }

        // 页面可见性变化时保存进度（移动端切到后台时触发）
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                const p = appState.progress;
                if (p && p.status === 'inprogress') {
                    // 暂停状态下不额外处理，只确保已保存
                    if (!p.isPaused && p.questionEntryWall > 0) {
                        const now = Date.now();
                        const pIncrease = (p.pausedTimeMs || 0) - (p.pausedTimeAtEntry || 0);
                        p.questionTimes[p.currentQuestion] = (p.questionTimes[p.currentQuestion] || 0) +
                            (now - p.questionEntryWall) - pIncrease;
                        p.questionEntryWall = now;
                        p.pausedTimeAtEntry = p.pausedTimeMs || 0;
                        saveState();
                    } else {
                        saveState();
                    }
                }
            }
        });

        // 页面关闭/刷新前保存当前题的计时
        window.addEventListener('beforeunload', function() {
            const p = appState.progress;
            if (p && !p.isPaused && p.questionEntryWall > 0) {
                const now = Date.now();
                const pIncrease = (p.pausedTimeMs || 0) - (p.pausedTimeAtEntry || 0);
                p.questionTimes[p.currentQuestion] = (p.questionTimes[p.currentQuestion] || 0) +
                    (now - p.questionEntryWall) - pIncrease;
                p.questionEntryWall = 0;
                saveState();
            }
        });

        // DOM 加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);

        console.log('考试计时器已加载');
        console.log('快捷键：A/B/C/D 选择选项，Space 暂停/恢复，ESC 答题卡');
    </script>

</body>
</html>
